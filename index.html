<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">

<style>

body{
margin:0;
background:black;
color:white;
font-family:Arial, Helvetica, sans-serif;
font-size:60px;
overflow:hidden;
}

/* container that hides overflow */
#ticker-wrap{
position:relative;
width:100%;
overflow:hidden;
height:90px;
}

/* scrolling ticker */
#ticker{
display:inline-block;
white-space:nowrap;
padding-left:100%;
animation:ticker 30s linear infinite;
letter-spacing:1px;
}

/* scrolling animation */
@keyframes ticker{
0% { transform:translateX(0); }
100% { transform:translateX(-100%); }
}

/* gain color */
.up{
color:#00ff7f;
font-weight:bold;
}

/* loss color */
.down{
color:#ff4d4d;
font-weight:bold;
}

/* spacing between items */
.separator{
color:#888;
padding:0 40px;
}

/* gradient edges for TV style */
body::before,
body::after{
content:"";
position:absolute;
top:0;
width:80px;
height:100%;
z-index:2;
}

body::before{
left:0;
background:linear-gradient(to right, black, transparent);
}

body::after{
right:0;
background:linear-gradient(to left, black, transparent);
}

</style>

</head>

<body>

<div id="ticker-wrap">

<div id="ticker">

<span class="up">S&P 500 ▲ 5230</span>
<span class="separator">|</span>

</div>

</body>
</html>

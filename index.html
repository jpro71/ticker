<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">

<style>

body{
margin:0;
background:black;
color:white;
font-family:Arial, Helvetica, sans-serif;
font-size:60px;
overflow:hidden;
}

#ticker-wrap{
position:relative;
width:100%;
overflow:hidden;
height:90px;
}

#ticker{
display:inline-block;
white-space:nowrap;
padding-left:100%;
animation:ticker 30s linear infinite;
letter-spacing:1px;
}

@keyframes ticker{
0% { transform:translateX(0); }
100% { transform:translateX(-100%); }
}

.up{
color:#00ff7f;
font-weight:bold;
}

.down{
color:#ff4d4d;
font-weight:bold;
}

.separator{
color:#888;
padding:0 40px;
}

</style>

</head>

<body>

<div id="ticker-wrap">
<div id="ticker">Loading market data...</div>
</div>

<script>

const symbols = [
"^DJI","^GSPC","^IXIC",
"AAPL","NVDA","TSLA","AMZN","MSFT","META","NFLX","GOOGL",
"COIN","SOFI","SNDK","PYPL",
"CRM","BABA","OXY","DELL",
"BTC-USD","ETH-USD","GC=F","CL=F"
];

function loadTicker(){

const url = "https://query1.finance.yahoo.com/v7/finance/quote?symbols=" + symbols.join(",");

fetch(url)
.then(response => response.json())
.then(data => {

let html = "";

data.quoteResponse.result.forEach(stock => {

let changeClass = stock.regularMarketChange >= 0 ? "up" : "down";
let arrow = stock.regularMarketChange >= 0 ? "▲" : "▼";

html += `<span class="${changeClass}">
${stock.symbol} ${arrow} ${stock.regularMarketPrice.toFixed(2)}
</span><span class="separator">|</span>`;

});

document.getElementById("ticker").innerHTML = html;

})
.catch(() => {
document.getElementById("ticker").innerHTML = "Market data unavailable";
});

}

loadTicker();

setInterval(loadTicker,300000);

</script>

</body>
</html>

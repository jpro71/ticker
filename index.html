<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
body{
margin:0;
background:black;
color:white;
font-family:Arial, Helvetica, sans-serif;
font-size:60px;
overflow:hidden;
}

#ticker{
white-space:nowrap;
position:absolute;
left:100%;
animation:ticker 30s linear infinite;
}

@keyframes ticker{
0% { left:100%; }
100% { left:-100%; }
}
</style>
</head>

<body>

<div id="ticker">
Loading market data...
</div>

<iframe src="https://financialmodelingprep.com/api/v3/quotes/index?apikey=demo"
style="display:none;"></iframe>

</body>
</html>

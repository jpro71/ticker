<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">

<style>

body{
margin:0;
background:black;
color:white;
font-family:Arial, Helvetica, sans-serif;
font-size:60px;
overflow:hidden;
}

#ticker-wrap{
position:relative;
width:100%;
overflow:hidden;
height:90px;
}

#ticker{
display:inline-block;
white-space:nowrap;
padding-left:100%;
animation:ticker 30s linear infinite;
letter-spacing:1px;
}

@keyframes ticker{
0% { transform:translateX(0); }
100% { transform:translateX(-100%); }
}

.up{
color:#00ff7f;
font-weight:bold;
}

.down{
color:#ff4d4d;
font-weight:bold;
}

.separator{
color:#888;
padding:0 40px;
}

</style>

</head>

<body>

<div id="ticker-wrap">
<div id="ticker">
Loading market data...
</div>
</div>

</body>
</html>

<!DOCTYPE html>
<html>
<head>

<style>
body{
margin:0;
background:black;
color:white;
font-family:Arial, Helvetica, sans-serif;
font-size:32px;
overflow:hidden;
}

/* Ticker container */
#ticker{
white-space:nowrap;
position:absolute;
left:100%;
padding:10px 0;
letter-spacing:1px;

/* Speed control (lower number = faster) */
animation:ticker 35s linear infinite;
}

/* Smooth scroll */
@keyframes ticker{
0% { left:100%; }
100% { left:-100%; }
}

/* Optional: style for gains and losses */
.up{
color:#00ff7f;
font-weight:bold;
}

.down{
color:#ff4d4d;
font-weight:bold;
}

.separator{
color:#888;
padding:0 25px;
}

</style>

</head>

<body>

<div id="ticker">

<span class="up">S&P 500 ▲ 5230</span>
<span class="separator">|</span>

<span class="up">NASDAQ ▲ 16350</span>
<span class="separator">|</span>

<span class="separator">|</span>

</div>

</body>
</html>

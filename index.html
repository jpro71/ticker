<!DOCTYPE html>
<html>
<body style="background:black;color:white;font-size:40px;">
<script>

var xhr = new XMLHttpRequest();
xhr.open("GET","https://api.github.com",true);

xhr.onreadystatechange=function(){
if(xhr.readyState===4){
document.write("XHR status: "+xhr.status);
}
};

xhr.send();

</script>
</body>
</html>

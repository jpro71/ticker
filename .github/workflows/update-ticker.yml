name: Update Market Ticker

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch market data
        run: |
          curl -s "https://query1.finance.yahoo.com/v7/finance/quote?symbols=%5EDJI,%5EGSPC,%5EIXIC,BTC-USD,GC=F,CL=F,AAPL,NVDA,TSLA,AMZN,MSFT,META,NFLX,GOOGL,COIN,SOFI,PYPL,CRM,BABA,OXY,DELL" > data.json

      - name: Build ticker
        run: |
          TICKER=$(jq -r '.quoteResponse.result[] | "\(.symbol) \(.regularMarketPrice)"' data.json | paste -sd " | " -)
          sed -i "s|Loading market data...|$TICKER|g" index.html

      - name: Commit changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add index.html
          git commit -m "Update ticker data" || echo "No changes"
          git push

name: Update Market Ticker

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch market data
        run: |
          curl -s "https://query1.finance.yahoo.com/v7/finance/quote?symbols=%5EDJI,%5EGSPC,%5EIXIC,BTC-USD,GC=F,CL=F,AAPL,NVDA,TSLA,AMZN,MSFT,META,NFLX,GOOGL,COIN,SOFI,PYPL,CRM,BABA,OXY,DELL" > data.json

      - name: Build ticker
        run: |
          python3 <<EOF
import json
data=json.load(open("data.json"))
items=[]
for r in data["quoteResponse"]["result"]:
    sym=r["symbol"]
    price=r.get("regularMarketPrice","")
    items.append(f"{sym} {price}")
ticker=" | ".join(items)
html=open("index.html").read()
html=html.replace("Loading market data...",ticker)
open("index.html","w").write(html)
EOF

      - name: Commit update
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add index.html
          git commit -m "Update ticker" || echo "No changes"
          git push

name: Update Market Ticker

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Get market data
        run: |
          curl -s "https://query1.finance.yahoo.com/v7/finance/quote?symbols=%5EDJI,%5EGSPC,%5EIXIC,BTC-USD,ETH-USD,GC=F,CL=F,AAPL,NVDA,TSLA,AMZN,MSFT,META,NFLX,GOOGL,COIN,SOFI,SNDK,PYPL,CRM,BABA,OXY,DELL" > data.json

      - name: Build ticker
        run: |
          python3 <<EOF
import json

data=json.load(open("data.json"))
items=[]

for s in data["quoteResponse"]["result"]:
    symbol=s["symbol"]
    price=round(s["regularMarketPrice"],2)
    change=s["regularMarketChange"]

    arrow="▲" if change>=0 else "▼"
    color="up" if change>=0 else "down"

    items.append(f'<span class="{color}">{symbol} {arrow} {price}</span><span class="separator">|</span>')

ticker=" ".join(items)

html=open("index.html").read()
html=html.replace("Loading market data...",ticker)

open("index.html","w").write(html)
EOF

      - name: Commit update
        run: |
          git config --global user.name "tickerbot"
          git config --global user.email "bot@example.com"
          git add index.html
          git commit -m "Update market ticker" || echo "No changes"
          git push
